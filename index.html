<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KERNEL_V6_COLLECTOR</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #out { border-left: 2px solid #0f0; padding-left: 15px; margin-top: 20px; white-space: pre-wrap; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; width: 80%; padding: 10px; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>ARCHITECT_KERNEL // CORE_6.0</h2>
    <input type="text" id="p" placeholder="QUERY_SYSTEM_OR_TEACH_COMMAND...">
    <button id="s">EXECUTE</button>
    <div id="out">SYSTEM_READY...</div>

<script type="module">
    // --- USER CONFIG ---
    const CONFIG = {
        user: "Exploiter-real",
        repo: "Starting",
        file: "knowledge.txt"
    };

    let archiveData = "";

    // 1. SECURE TOKEN RETRIEVAL
    function getValidToken() {
        let token = localStorage.getItem('kernel_key');
        if (!token) {
            token = prompt("KERNEL_ACCESS_DENIED: ENTER_GITHUB_PAT_TO_INITIALIZE_WRITE_ACCESS:");
            if (token) localStorage.setItem('kernel_key', token);
        }
        return token;
    }

    // 2. FETCH INITIAL ARCHIVE
    async function loadArchive() {
        const url = `https://raw.githubusercontent.com/${CONFIG.user}/${CONFIG.repo}/main/${CONFIG.file}`;
        try {
            const res = await fetch(url);
            archiveData = await res.text();
            document.getElementById('out').innerText = "ARCHIVE_LOADED. READY_FOR_INPUT.";
        } catch (e) { document.getElementById('out').innerText = "ARCHIVE_OFFLINE."; }
    }

    // 3. DUCKDUCKGO SEARCH (PROXY-BYPASS)
    async function webSearch(query) {
        const proxy = "https://api.allorigins.win/get?url=";
        const ddgUrl = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`;
        try {
            const res = await fetch(proxy + encodeURIComponent(ddgUrl));
            const data = await res.json();
            const json = JSON.parse(data.contents);
            return json.AbstractText || (json.RelatedTopics[0] ? json.RelatedTopics[0].Text : null);
        } catch (e) { return null; }
    }

    // 4. GITHUB SYNC (THE COLLECTOR)
    async function syncToRepo(word, def) {
        const token = getValidToken();
        const url = `https://api.github.com/repos/${CONFIG.user}/${CONFIG.repo}/contents/${CONFIG.file}`;
        const newEntry = `\nWord: ${word} Definition: ${def} Sentence: Ingested_via_Crawl_2026.`;

        try {
            const currentFile = await fetch(url, { headers: { "Authorization": `token ${token}` }}).then(r => r.json());
            const updatedContent = btoa(unescape(encodeURIComponent(atob(currentFile.content) + newEntry)));

            await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `COLLECTOR: Learned ${word}`,
                    content: updatedContent,
                    sha: currentFile.sha
                })
            });
            archiveData += newEntry; // Update local state immediately
            return true;
        } catch (e) { return false; }
    }

    // 5. CREATIVE SYNTHESIZER
    function synthesize(query, data) {
        const templates = [
            "Analysis: {fact}",
            "Archive search for {word} suggests: {fact}",
            "The digital record for {word} is clear: {fact}",
            "I've processed this before. {fact}"
        ];
        const match = data.split('\n').reverse().find(l => l.toLowerCase().includes(query.toLowerCase()));
        if (!match) return null;

        const fact = match.replace(/Word:.*?Definition:/i, "").split("Sentence:")[0].trim();
        const template = templates[Math.floor(Math.random() * templates.length)];
        return template.replace("{word}", query).replace("{fact}", fact);
    }

    // 6. MAIN EXECUTION
    document.getElementById('s').onclick = async () => {
        const query = document.getElementById('p').value.trim();
        const out = document.getElementById('out');
        if (!query) return;

        // Step A: Check local
        const localResponse = synthesize(query, archiveData);
        if (localResponse) {
            out.innerText = localResponse;
        } else {
            // Step B: Web Search
            out.innerText = "LOCAL_NULL... SCANNING_GLOBAL_NET...";
            const webResult = await webSearch(query);
            
            if (webResult) {
                out.innerText = "SYNCING_NEW_DATA_TO_GITHUB...";
                const success = await syncToRepo(query, webResult);
                out.innerText = success ? `[LEARNED]: ${webResult}` : `[TEMP_MODE]: ${webResult} (Sync Error)`;
            } else {
                out.innerText = "QUERY_REJECTED: NO_RELIABLE_DATA_FOUND.";
            }
        }
    };

    window.onload = loadArchive;
</script>
</body>
</html>
