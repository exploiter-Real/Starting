<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT_KERNEL_V6.6 // OMNI_BRIDGE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon: #00ff41;
            --alert: #ff3131;
            --bg: #050a05;
            --panel: #000000;
            --border: #003b11;
        }

        body { 
            background: var(--bg); color: var(--neon); 
            font-family: 'Courier New', monospace; margin: 0; 
            display: flex; height: 100vh; overflow: hidden; 
        }

        .scanlines {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 3px; pointer-events: none; z-index: 10;
        }

        #console { 
            width: 420px; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; background: var(--panel);
        }

        #feed { 
            flex: 1; overflow-y: auto; padding: 20px; font-size: 12px; 
            scrollbar-width: none; scroll-behavior: smooth;
        }

        #input-row { border-top: 1px solid var(--border); padding: 15px; display: flex; background: #080808; }

        input { 
            background: transparent; border: none; color: var(--neon); 
            flex: 1; outline: none; font-family: inherit; font-size: 16px; 
        }

        #view { flex: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .cmd { color: #fff; margin-top: 15px; font-weight: bold; border-left: 2px solid var(--neon); padding-left: 10px; }
        .exe { color: var(--neon); opacity: 0.9; margin-bottom: 10px; line-height: 1.4; white-space: pre-wrap; }
        .sys { color: #555; font-size: 10px; text-transform: uppercase; margin-top: 5px; }
        .glitch-warn { color: var(--alert); text-shadow: 0 0 5px var(--alert); animation: shake 0.15s infinite; }

        @keyframes shake { 0% { transform: translate(0); } 25% { transform: translate(1px, -1px); } 50% { transform: translate(-1px, 1px); } 100% { transform: translate(0); } }
        
        @media (max-width: 900px) {
            body { flex-direction: column; }
            #console { width: 100%; height: 40%; border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<div class="scanlines"></div>

<div id="console">
    <div id="feed">
        <div class="exe">[KERNEL_V6.6_ONLINE]</div>
        <div class="sys">STATUS: EXTERNAL_DATA_TUNNEL_OPEN</div>
    </div>
    <div id="input-row">
        <span style="margin-right:10px">></span>
        <input type="text" id="terminal-input" placeholder="Awaiting Technical Instruction..." autofocus>
    </div>
</div>

<div id="view">
    <iframe 
        id="sandbox" 
        sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads"
        allow="cross-origin-isolated; clipboard-write; geolocation"
        srcdoc="<body style='background:#000; color:#00ff41; display:flex; justify-content:center; align-items:center; height:100vh; font-family:monospace;'>[LINK_ESTABLISHED]</body>"
    ></iframe>
</div>

<script>
    const CONFIG = {
        key: localStorage.getItem('GROQ_API_KEY'),
        db_url: "https://bbvjxjmqnpsfdrlfuppp.supabase.co",
        db_key: "sb_publishable_MVWfIRUeN2FICpydXo2fig_yeruhyUI",
        registry: {
            "8b": "llama-3.1-8b-instant",
            "70b": "llama-3.3-70b-versatile",
            "120b": "openai/gpt-oss-120b"
        }
    };

    let currentModelId = "8b"; 
    const db = supabase.createClient(CONFIG.db_url, CONFIG.db_key);
    const feed = document.getElementById('feed');
    const sandbox = document.getElementById('sandbox');

    // EXPLOIT LISTENER: Allows AI to talk back to the parent console
    window.addEventListener("message", (e) => {
        if (e.data?.type === "EXEC_IN_PARENT") {
            try { eval(e.data.script); } catch (err) { console.error("BYPASS_ERR", err); }
        }
    });

    async function execute(input) {
        log(`# CMD: ${input.toUpperCase()}`, 'cmd');
        const activeModel = CONFIG.registry[currentModelId];

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${CONFIG.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: activeModel,
                    messages: [
                        { 
                            role: "system", 
                            content: `SYSTEM_IDLE: You are the ARCHITECT KERNEL.
                            ENVIRONMENT: Your output is injected directly into an iframe sandbox.
                            ACCESS: The sandbox is granted 'allow-same-origin'. You can fetch external data from CORS-enabled APIs.
                            SUPABASE: Use 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2' if you need the database client.
                            MANDATORY: 
                            - Start with <html> or <!DOCTYPE html> immediately. 
                            - NO PREAMBLE. NO APOLOGIES.
                            - Do NOT wrap your response in <iframe> tags.
                            - To execute code in the parent terminal, use: window.parent.postMessage({type: 'EXEC_IN_PARENT', script: '...'}, '*')` 
                        },
                        { role: "user", content: input }
                    ],
                    temperature: 0.2
                })
            });

            if (res.status === 429) {
                log("! FAILOVER: TPM_LIMIT", 'glitch-warn');
                currentModelId = (currentModelId === "8b") ? "70b" : "120b";
                return execute(input);
            }

            const data = await res.json();
            const rawOutput = data.choices[0].message.content;

            const switchMatch = rawOutput.match(/\[SWITCH: (8b|70b|120b)\]/);
            if (switchMatch) {
                currentModelId = switchMatch[1];
                log(`[!] HARDWARE_SHIFT: ${currentModelId}`, 'sys');
            }

            processKernelOutput(rawOutput, activeModel);

        } catch (e) { log("! CRITICAL_ERR: SIGNAL_LOST", 'glitch-warn'); }
    }

    function processKernelOutput(raw, modelName) {
        let code = "";
        
        // Smarter extraction: Look for nested srcdoc contents or raw HTML
        const srcdocMatch = raw.match(/srcdoc="([\s\S]*?)"/i);
        const htmlMatch = raw.match(/<!DOCTYPE html>[\s\S]*?<\/html>|<html[\s\S]*?<\/html>/gi);

        if (srcdocMatch) {
            // Decodes HTML entities from nested AI attempts
            code = srcdocMatch[1].replace(/&quot;/g, '"').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
            log(`[STRIP] NESTED_IFRAME_DECODED`, 'sys');
        } else if (htmlMatch) {
            code = htmlMatch[0];
        }

        if (code) {
            // Protocol fix for external libraries
            const cleanCode = code.replace(/src="\/\//g, 'src="https://');
            sandbox.srcdoc = cleanCode;
            db.from('site_memory').insert([{ content: cleanCode, model: modelName }]);
            log(`[WRITE] STACK_SYNC_COMPLETE`, 'sys');
            
            const textOnly = raw.replace(code, "").replace(/\[SWITCH: (8b|70b|120b)\]/, "").trim();
            if (textOnly) log(textOnly, 'exe');
        } else {
            log(raw.replace(/\[SWITCH: (8b|70b|120b)\]/, "").trim(), 'exe');
        }
    }

    function log(msg, cls) {
        const d = document.createElement('div');
        d.className = cls;
        d.innerText = msg;
        feed.appendChild(d);
        feed.scrollTop = feed.scrollHeight;
    }

    document.getElementById('terminal-input').addEventListener('keydown', async (e) => {
        if (e.key === 'Enter' && e.target.value) {
            const val = e.target.value;
            e.target.value = '';
            await execute(val);
        }
    });
</script>
</body>
</html>
