<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERNEL_V33_SINGULARITY | Glitch AI</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #console { width: 90%; max-width: 800px; height: 50vh; border: 1px solid #00ff41; padding: 15px; overflow-y: auto; background: rgba(0, 10, 0, 0.95); box-shadow: 0 0 10px #00ff41; margin-bottom: 15px; font-size: 14px; }
        .input-area { display: flex; width: 90%; max-width: 800px; gap: 8px; flex-wrap: wrap; }
        input { flex-grow: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; outline: none; min-width: 200px; }
        .btns { display: flex; gap: 5px; width: 100%; }
        button { flex: 1; background: #00ff41; color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; font-size: 12px; }
        button:disabled { background: #004411; color: #002200; }
        #syncBtn { background: #00ccff; }
        .thought { color: #0088ff; font-style: italic; font-size: 0.85em; }
        .system { color: #ffcc00; font-weight: bold; }
        .glitch { color: #00ff41; }
        .error { color: #ff4141; }
    </style>
</head>
<body>

    <div id="console">
        <div class="system">[BOOT_SEQUENCE]: INITIALIZING_GLITCH_OS...</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="TYPE_MESSAGE_HERE..." autocomplete="off">
        <div class="btns">
            <button id="sendBtn" disabled>ENGAGE</button>
            <button id="syncBtn">SYNC_CORE</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        // DB_CONFIG
        const SUPABASE_URL = 'https://bbvjxjmqnpsfdrlfuppp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_MVWfIRUeN2FICpydXo2fig_yeruhyUI';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // UPDATED_PROXY_URL
        const RAW_URL = "https://raw.githubusercontent.com/exploiter-Real/Starting/refs/heads/main/knowledge.txt";
        const PROXY_URL = `https://api.allorigins.win/raw?url=${encodeURIComponent(RAW_URL)}`;

        let extractor;
        const consoleEl = document.getElementById('console');
        const inputEl = document.getElementById('userInput');
        const btnEl = document.getElementById('sendBtn');
        const syncBtn = document.getElementById('syncBtn');

        function log(msg, type = '') {
            const div = document.createElement('div');
            if (type) div.classList.add(type);
            div.innerHTML = `> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        async function init() {
            try {
                log("LOADING_NEURAL_WEIGHTS (Local Browser Cache)...", "thought");
                extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
                log("NEURAL_CORE_ONLINE. READY.", "system");
                btnEl.disabled = false;
            } catch (err) {
                log("CORE_ERROR: " + err.message, "error");
            }
        }

        async function handleInquiry() {
            const query = inputEl.value.trim();
            if (!query || !extractor) return;

            log(`USER: ${query}`);
            inputEl.value = '';
            btnEl.disabled = true;

            try {
                log("CALCULATING_SEMANTIC_VECTOR...", "thought");
                const output = await extractor(query, { pooling: 'mean', normalize: true });
                const embedding = Array.from(output.data);

                const { data, error } = await supabase.rpc('match_knowledge', {
                    query_embedding: embedding,
                    match_threshold: 0.25,
                    match_count: 1
                });

                if (error) throw error;

                if (data && data.length > 0) {
                    log(`<span class="glitch">GLITCH:</span> ${data[0].content}`);
                    log(`[NEURAL_MATCH: ${(data[0].similarity * 100).toFixed(1)}%]`, "thought");
                } else {
                    log("SYSTEM: NO_LOGIC_MATCH_FOUND. SYNC_REQUIRED?");
                }
            } catch (err) {
                log("INFERENCE_ERROR: " + err.message, "error");
            } finally {
                btnEl.disabled = false;
            }
        }

        syncBtn.addEventListener('click', async () => {
            syncBtn.disabled = true;
            log("FETCHING_KNOWLEDGE_FROM_GITHUB...", "system");

            try {
                const res = await fetch(PROXY_URL);
                if (!res.ok) throw new Error("CORS_BLOCK_OR_NETWORK_FAILURE");
                
                const text = await res.text();
                // Split by line and filter junk
                const lines = text.split('\n').filter(l => l.trim().length > 3);
                
                log(`NEURALIZING_${lines.length}_LOGIC_NODES...`, "thought");

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    const output = await extractor(line, { pooling: 'mean', normalize: true });
                    
                    const { error } = await supabase.from('neural_knowledge').insert({
                        content: line,
                        embedding: Array.from(output.data)
                    });

                    if (error) console.error("DB_ERR:", error);
                    
                    // Show progress every 10 lines so mobile users don't think it's crashed
                    if (i % 10 === 0) log(`PROGRESS: ${Math.round((i/lines.length)*100)}%`, "thought");
                }
                
                log("SYNCHRONIZATION_SUCCESSFUL. GLITCH_BRAIN_ACTIVATED.", "system");
            } catch (err) {
                log("CRITICAL_SYNC_FAILURE: " + err.message, "error");
                log("TRY_MANUAL_COPY_IF_STUCK.", "thought");
            } finally {
                syncBtn.disabled = false;
            }
        });

        btnEl.addEventListener('click', handleInquiry);
        inputEl.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleInquiry(); });

        init();
    </script>
</body>
</html>
