<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KERNEL_V33 | MOBILE_NEURAL_CORE</title>
    <script src="https://unpkg.com/brain.js"></script>
    <style>
        /* Mobile-first hacker aesthetic */
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #status { color: #ffae00; font-size: 0.7em; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        #console { flex-grow: 1; border: 2px solid #00ff41; padding: 10px; overflow-y: auto; background: #000; box-shadow: inset 0 0 10px #00ff41; border-radius: 5px; font-size: 14px; margin-bottom: 10px; -webkit-overflow-scrolling: touch; }
        .input-area { display: flex; gap: 5px; height: 50px; }
        input { flex-grow: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; outline: none; font-size: 16px; /* Prevents zoom on focus */ }
        button { background: #00ff41; color: #000; border: none; padding: 0 15px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .ai-msg { color: #00ff41; margin-bottom: 8px; }
        .user-msg { color: #00bcff; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div id="status">INIT: AWAITING_SYNAPSE...</div>
    <div id="console"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Wait for mapping..." disabled>
        <button id="sendBtn" disabled>SEND</button>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        
        const supabase = createClient('https://bbvjxjmqnpsfdrlfuppp.supabase.co', 'sb_publishable_MVWfIRUeN2FICpydXo2fig_yeruhyUI');
        
        // LSTM is better for text but heavier on mobile. 
        // If it crashes, change 'LSTM' to 'RNN' for faster, lighter training.
        const net = new brain.recurrent.LSTM(); 
        
        const consoleEl = document.getElementById('console');
        const inputEl = document.getElementById('userInput');
        const btnEl = document.getElementById('sendBtn');
        const statusEl = document.getElementById('status');

        function log(msg, type = 'ai-msg') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        async function trainBrain() {
            statusEl.textContent = "STATUS: FETCHING_LOGIC_STREAM... 💀";
            
            const { data, error } = await supabase.from('neural_knowledge').select('content');
            
            if (data && data.length > 0) {
                statusEl.textContent = "STATUS: MAPPING_NEURONS (Stay on this screen)... 🧠";
                
                // We chunk the data for mobile processing
                const trainingData = data.map(item => ({
                    input: item.content.split(' ').slice(0, 3).join(' '), // Short context for faster learning
                    output: item.content
                }));

                try {
                    await net.train(trainingData, {
                        iterations: 50, // Lowered for Android performance
                        log: (details) => console.log(details),
                        errorThresh: 0.02
                    });

                    statusEl.textContent = "STATUS: NEURAL_CORE_ONLINE 😁";
                    inputEl.disabled = false;
                    btnEl.disabled = false;
                    inputEl.placeholder = "Talk to Glitch...";
                    log("SYSTEM READY. ARCHIVE KERNEL V33 DEPLOYED.", "ai-msg");
                } catch (e) {
                    statusEl.textContent = "STATUS: TRAINING_CRASHED 💀";
                    log("ERROR: Mobile memory limit exceeded. Try fewer lines of logic.");
                }
            }
        }

        async function handleChat() {
            const query = inputEl.value;
            if (!query) return;
            log(query, "user-msg");
            inputEl.value = '';

            // The brain generates a response based on the logic patterns
            const response = net.run(query);
            
            if (response) {
                log(`GLITCH: ${response} 😁`);
            } else {
                log(`GLITCH: Unmapped logic path. 💀`);
            }
        }

        btnEl.addEventListener('click', handleChat);
        inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });

        trainBrain();
    </script>
</body>
</html>
