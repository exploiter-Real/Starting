<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERNEL_V33_SINGULARITY | Persistent Sync</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #console { width: 90%; max-width: 800px; height: 50vh; border: 1px solid #00ff41; padding: 15px; overflow-y: auto; background: rgba(0, 10, 0, 0.95); box-shadow: 0 0 10px #00ff41; margin-bottom: 15px; font-size: 14px; }
        .input-area { display: flex; width: 90%; max-width: 800px; gap: 8px; flex-wrap: wrap; }
        input { flex-grow: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; outline: none; min-width: 200px; }
        .btns { display: flex; gap: 5px; width: 100%; }
        button { flex: 1; background: #00ff41; color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; font-size: 12px; }
        button:disabled { background: #004411; color: #002200; }
        #syncBtn { background: #00ccff; }
        #clearBtn { background: #ff4141; max-width: 100px; }
        .thought { color: #0088ff; font-style: italic; font-size: 0.85em; }
        .system { color: #ffcc00; font-weight: bold; }
        .glitch { color: #00ff41; }
    </style>
</head>
<body>

    <div id="console">
        <div class="system">[BOOT_SEQUENCE]: INITIALIZING_GLITCH_OS...</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="TYPE_MESSAGE_HERE..." autocomplete="off">
        <div class="btns">
            <button id="sendBtn" disabled>ENGAGE</button>
            <button id="syncBtn">SYNC_CORE</button>
            <button id="clearBtn" title="Clear Token">CLR</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        const SUPABASE_URL = 'https://bbvjxjmqnpsfdrlfuppp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_MVWfIRUeN2FICpydXo2fig_yeruhyUI';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const RAW_URL = "https://raw.githubusercontent.com/exploiter-Real/Starting/refs/heads/main/knowledge.txt";

        let extractor;
        const consoleEl = document.getElementById('console');
        const inputEl = document.getElementById('userInput');
        const btnEl = document.getElementById('sendBtn');
        const syncBtn = document.getElementById('syncBtn');
        const clearBtn = document.getElementById('clearBtn');

        function log(msg, type = '') {
            const div = document.createElement('div');
            if (type) div.classList.add(type);
            div.innerHTML = `> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        async function init() {
            try {
                log("LOADING_NEURAL_WEIGHTS...", "thought");
                extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
                log("NEURAL_CORE_ONLINE. PERSISTENT_AUTH_ENABLED.", "system");
                btnEl.disabled = false;
            } catch (err) {
                log("CORE_ERROR: " + err.message);
            }
        }

        syncBtn.addEventListener('click', async () => {
            // Check LocalStorage first
            let pat = localStorage.getItem('gh_token');
            
            if (!pat) {
                pat = prompt("NO_TOKEN_FOUND. ENTER_GITHUB_PAT:");
                if (pat) localStorage.setItem('gh_token', pat);
                else return;
            }

            syncBtn.disabled = true;
            log("INITIATING_SECURE_FETCH (Using Cached Token)...", "system");

            try {
                const res = await fetch(RAW_URL, {
                    headers: { 'Authorization': `token ${pat}` }
                });

                if (!res.ok) {
                    if (res.status === 401) {
                        localStorage.removeItem('gh_token');
                        throw new Error("INVALID_TOKEN. CLEARING_CACHE.");
                    }
                    throw new Error(`HTTP_${res.status}: FETCH_FAILED`);
                }
                
                const text = await res.text();
                // Split by double line breaks or section markers
                const chunks = text.split(/\n\n|---/).filter(l => l.trim().length > 5);
                
                log(`SYNC_ACTIVE: PROCESSING_${chunks.length}_SECTIONS...`);

                for (let i = 0; i < chunks.length; i++) {
                    const chunk = chunks[i].trim();
                    const output = await extractor(chunk, { pooling: 'mean', normalize: true });
                    
                    await supabase.from('neural_knowledge').insert({
                        content: chunk,
                        embedding: Array.from(output.data)
                    });

                    if (i % 5 === 0) log(`ENCODING: ${Math.round((i/chunks.length)*100)}%`, "thought");
                }
                log("SYNCHRONIZATION_COMPLETE. KERNEL_UPDATED.", "system");
            } catch (err) {
                log("SYNC_FAILURE: " + err.message);
            } finally {
                syncBtn.disabled = false;
            }
        });

        clearBtn.addEventListener('click', () => {
            localStorage.removeItem('gh_token');
            log("TOKEN_PURGED_FROM_LOCAL_STORAGE.", "system");
        });

        async function handleInquiry() {
            const query = inputEl.value.trim();
            if (!query || !extractor) return;

            log(`USER: ${query}`);
            inputEl.value = '';
            btnEl.disabled = true;

            try {
                const output = await extractor(query, { pooling: 'mean', normalize: true });
                const embedding = Array.from(output.data);

                const { data, error } = await supabase.rpc('match_knowledge', {
                    query_embedding: embedding,
                    match_threshold: 0.2,
                    match_count: 1
                });

                if (error) throw error;

                if (data && data.length > 0) {
                    log(`<span class="glitch">GLITCH:</span> ${data[0].content}`);
                } else {
                    log("GLITCH: I haven't been trained on that yet! 😁");
                }
            } catch (err) {
                log("ERROR: " + err.message);
            } finally {
                btnEl.disabled = false;
            }
        }

        btnEl.addEventListener('click', handleInquiry);
        inputEl.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleInquiry(); });
        init();
    </script>
</body>
</html>
