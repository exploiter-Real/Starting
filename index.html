        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #console { width: 450px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--panel); z-index: 100; transition: all 0.3s ease; }
        #status-bar { height: 30px; background: var(--border); color: #000; font-size: 11px; font-weight: bold; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; text-transform: uppercase; }

        #input-row { border-top: 1px solid var(--border); padding: 20px; display: flex; background: #080808; }
        input { background: transparent; border: none; color: var(--neon); flex: 1; outline: none; font-family: inherit; font-size: 14px; }
        #view { flex: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Log Styles */
        .cmd { color: #fff; margin-top: 20px; font-weight: bold; border-left: 2px solid var(--neon); padding-left: 10px; text-transform: uppercase; }
        .exe { color: var(--neon); opacity: 0.9; white-space: pre-wrap; margin-bottom: 10px; }
        .sys { color: #555; font-size: 10px; margin-top: 5px; font-style: italic; }
        .critical { color: var(--alert); font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
