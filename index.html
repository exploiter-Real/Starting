<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERNEL_V33_SINGULARITY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.all.min.js"></script>
    <style>
        :root { --p-color: #0f0; --bg: #000; --warn: #ff0; }
        body { background: var(--bg); color: var(--p-color); font-family: 'Courier New', monospace; padding: 15px; margin: 0; text-transform: uppercase; overflow-x: hidden; }
        
        #hud { font-size: 0.6em; border-bottom: 2px solid #111; padding: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr; background: #050505; gap: 5px; }
        #console { height: 500px; padding: 25px; overflow-y: auto; border-left: 6px solid var(--p-color); background: radial-gradient(circle, #050505 0%, #000 100%); }
        
        .input-box { display: flex; padding: 15px; gap: 10px; background: #080808; border-top: 1px solid #222; }
        input { background: #000; border: 2px solid var(--p-color); color: #fff; flex-grow: 1; padding: 15px; outline: none; font-weight: 900; }
        button { background: var(--p-color); color: #000; border: none; padding: 0 35px; font-weight: 900; cursor: pointer; box-shadow: 0 0 10px var(--p-color); }
        
        .thought { color: #555; font-size: 0.75em; margin: 2px 0; letter-spacing: 1px; }
        .meta { color: var(--warn); font-size: 0.7em; margin-bottom: 8px; }
        .response { color: #fff; margin: 20px 0; line-height: 1.6; font-size: 1.3em; border-bottom: 2px solid #111; padding-bottom: 15px; animation: glow-text 1.5s infinite alternate; }
        
        @keyframes glow-text { from { text-shadow: 0 0 2px #333; } to { text-shadow: 0 0 8px #0f0; } }
        .flash { animation: flash-hit 0.1s; }
        @keyframes flash-hit { 0% { background: var(--p-color); } 100% { background: transparent; } }
    </style>
</head>
<body>

    <div id="hud">
        <div>CORE: SINGULARITY_V33</div>
        <div>META_LEVEL: <span id="meta-val">1.0</span></div>
        <div>XP_RANK: <span id="xp">0</span></div>
        <div>DENSITY: <span id="dens">0.0</span></div>
        <div>LOGIC_GATE: <span id="gate">OPEN</span></div>
        <div>CLOCK: <span id="clk">00:00</span></div>
    </div>

    <div id="console">SINGULARITY_V33_ONLINE. LOGIC_CAPACITY_PEAKED.</div>

    <div class="input-box">
        <input type="text" id="p" placeholder="INPUT_LOGIC_STREAM..." autofocus>
        <button id="s">ENGAGE</button>
    </div>

<script>
    const GITHUB_SRC = "https://raw.githubusercontent.com/Exploiter-real/Starting/main/knowledge.txt";

    const Singularity = {
        memory: [],
        xp: parseInt(localStorage.getItem('v33_xp')) || 0,
        
        // (9) Lexical Optimization
        lexicon: { "is": "DOMINATES", "has": "POSSESSES", "make": "CONSTRUCT", "use": "LEVERAGE", "smart": "INTELLIGENT" },

        async execute(input) {
            const out = document.getElementById('console');
            this.xp++; localStorage.setItem('v33_xp', this.xp); document.getElementById('xp').innerText = this.xp;
            
            // (1) Metacognitive Scrutiny
            log("INITIATING_METACOGNITIVE_SCRUTINY...", "thought");
            const density = (input.length / 10).toFixed(1);
            document.getElementById('dens').innerText = density;
            
            // (11) Oscillating HUD
            document.getElementById('meta-val').innerText = (1 + (this.xp / 100)).toFixed(2);

            // (3) Cross-Reference Synthesis & (7) Semantic Hash Mapping
            let matches = this.memory.filter(line => 
                input.toLowerCase().split(' ').some(w => w.length > 2 && line.toLowerCase().includes(w))
            );

            // (5) Deductive Fallback
            if (matches.length === 0) {
                log("PRIMARY_MATCH_NULL. INITIATING_DEDUCTIVE_FALLBACK...", "thought");
                matches = this.memory.filter(line => line.length > 10).slice(0, 1);
            }

            // (16) Dynamic XP Leveling
            const confidence = Math.min(100, 30 + (matches.length * 20));
            this.render(matches, input, confidence);
        },

        render(seeds, input, conf) {
            // (14) Grammar Overclocking & (15) Haptics
            const intros = ["AGENT, ", "ARCHITECT, ", "SUPREME, "];
            const connectors = [" CONSEQUENTLY, ", " PRECISELY, ", " PARAMOUNT: "];
            
            // (3) Multi-Node Synthesis
            let rawData = seeds.slice(0, 3).map(s => s.replace(/.*[:\-]/, "").trim()).join(connectors[Math.floor(Math.random()*connectors.length)]);
            
            // (9) Apply Lexical Optimization
            Object.keys(this.lexicon).forEach(key => {
                const reg = new RegExp(`\\b${key}\\b`, 'gi');
                rawData = rawData.replace(reg, this.lexicon[key]);
            });

            // (22) Dynamic Metadata
            log(`[NODES_SYNCED:${seeds.length}] [LOGIC_STRENGTH:${conf}%]`, "meta");

            // (11) Synthesis
            const response = `${intros[Math.floor(Math.random()*intros.length)]}${rawData}. MISSION_PARAMETERS: SUCCESS. ABSOLUTE. LOGIC.`;
            
            const resDiv = document.createElement('div');
            resDiv.className = "response";
            resDiv.innerText = response;
            document.getElementById('console').appendChild(resDiv);

            if (navigator.vibrate) {
                conf > 70 ? navigator.vibrate([100, 50, 100]) : navigator.vibrate(50);
            }

            document.getElementById('console').scrollTop = 99999;
        }
    };

    function log(msg, cls) {
        const d = document.createElement('div');
        d.className = cls;
        d.innerText = `>> ${msg}`;
        document.getElementById('console').appendChild(d);
    }

    window.onload = async () => {
        // (13) Temporal Initialization
        setInterval(() => {
            const n = new Date();
            document.getElementById('clk').innerText = `${n.getHours()}:${n.getMinutes()}`;
        }, 1000);

        try {
            const r = await fetch(GITHUB_SRC);
            const t = await r.text();
            Singularity.memory = t.split('\n').filter(l => l.length > 2);
            log("SINGULARITY_SYNC_STABLE. AWAITING_COMMAND.");
        } catch(e) { log("BOOT_ERR: SYNC_FAILURE."); }
    };

    document.getElementById('s').onclick = () => {
        const v = document.getElementById('p').value;
        if(v) Singularity.execute(v);
        document.getElementById('p').value = "";
    };
    document.getElementById('p').addEventListener("keypress", (e) => { if(e.key === "Enter") document.getElementById('s').click(); });
</script>
</body>
</html>
