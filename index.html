<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERNEL_V33_SINGULARITY</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #console { width: 90%; max-width: 800px; height: 40vh; border: 1px solid #00ff41; padding: 15px; overflow-y: auto; background: #000; margin-bottom: 10px; }
        #bulkInput { width: 90%; max-width: 800px; height: 100px; background: #111; border: 1px dashed #00ff41; color: #00ff41; padding: 10px; margin-bottom: 10px; font-size: 12px; outline: none; }
        .input-area { display: flex; width: 90%; max-width: 800px; gap: 10px; margin-bottom: 10px; }
        input { flex-grow: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; font-size: 11px; }
        button:disabled { background: #004411; }
        #uploadBtn { background: #00ccff; }
        .sys { color: #888; }
    </style>
</head>
<body>

    <div id="console">
        <div class="sys">[SYSTEM]: TERMINAL_ACTIVE...</div>
    </div>

    <textarea id="bulkInput" placeholder="PASTE_KNOWLEDGE_TEXT_HERE (No formatting needed)"></textarea>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask anything..." autocomplete="off">
        <button id="sendBtn" disabled>SEND</button>
        <button id="uploadBtn">UPLOAD_TO_SUPABASE</button>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        const SUPABASE_URL = 'https://bbvjxjmqnpsfdrlfuppp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_MVWfIRUeN2FICpydXo2fig_yeruhyUI';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let extractor;
        const consoleEl = document.getElementById('console');
        const bulkEl = document.getElementById('bulkInput');
        const inputEl = document.getElementById('userInput');
        const btnEl = document.getElementById('sendBtn');
        const uploadBtn = document.getElementById('uploadBtn');

        function log(msg) {
            const div = document.createElement('div');
            div.textContent = `> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        async function init() {
            try {
                extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
                log("NEURAL_ENGINE_READY");
                btnEl.disabled = false;
            } catch (err) {
                log("INIT_ERR: " + err.message);
            }
        }

        uploadBtn.addEventListener('click', async () => {
            const rawText = bulkEl.value.trim();
            if (!rawText) return log("INPUT_EMPTY");

            uploadBtn.disabled = true;
            log("PARSING_TEXT_FILE...");

            try {
                // Splits by any line that has significant text
                const lines = rawText.split('\n').filter(l => l.trim().length > 5);
                log(`INJECTING_${lines.length}_NODES_TO_DATABASE...`);

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    // 1. Generate Math Embedding (Vector)
                    const output = await extractor(line, { pooling: 'mean', normalize: true });
                    const embedding = Array.from(output.data);

                    // 2. Direct Upload to Supabase
                    const { error } = await supabase.from('neural_knowledge').insert({
                        content: line,
                        embedding: embedding
                    });

                    if (error) console.error("UPLOAD_ERR:", error);
                    if (i % 5 === 0) log(`PROGRESS: ${Math.round((i/lines.length)*100)}%`);
                }
                
                log("UPLOAD_COMPLETE: DATABASE_SYNCED");
                bulkEl.value = ""; // Clear box after success
            } catch (err) {
                log("FATAL_ERROR: " + err.message);
            } finally {
                uploadBtn.disabled = false;
            }
        });

        async function handleInquiry() {
            const val = inputEl.value.trim();
            if (!val || !extractor) return;
            log(`USER: ${val}`);
            inputEl.value = '';

            try {
                const output = await extractor(val, { pooling: 'mean', normalize: true });
                const embedding = Array.from(output.data);

                const { data, error } = await supabase.rpc('match_knowledge', {
                    query_embedding: embedding,
                    match_threshold: 0.1, // Adjusted for broader matching
                    match_count: 1
                });

                if (error) throw error;
                if (data && data.length > 0) log(`AI: ${data[0].content}`);
                else log("AI: NO_MATCH_FOUND");
            } catch (err) {
                log("ERR: " + err.message);
            }
        }

        btnEl.addEventListener('click', handleInquiry);
        inputEl.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleInquiry(); });
        init();
    </script>
</body>
</html>
