<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARCHITECT_KERNEL_V6 // NEURAL_GATE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon: #00ff41;
            --alert: #ff3131;
            --bg: #050a05;
            --panel: #000000;
            --border: #003b11;
        }

        body { 
            background: var(--bg); 
            color: var(--neon); 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* CRT Scanline Overlay */
        .scanlines {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%), 
                        linear-gradient(90deg, rgba(255,0,0,0.02), rgba(0,255,0,0.01), rgba(0,0,255,0.02));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 10;
        }

        /* Sidebar Console */
        #console { 
            width: 420px; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            background: var(--panel);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        #feed { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            font-size: 12px; 
            scrollbar-width: none;
            scroll-behavior: smooth;
        }

        #input-row { 
            border-top: 1px solid var(--border); 
            padding: 15px; 
            display: flex; 
            background: #080808;
        }

        input { 
            background: transparent; border: none; color: var(--neon); 
            flex: 1; outline: none; font-family: inherit; font-size: 14px; 
        }

        /* Sandbox Workspace */
        #view { flex: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Log Styling */
        .cmd { color: #fff; margin-top: 15px; font-weight: bold; border-left: 2px solid var(--neon); padding-left: 10px; }
        .exe { color: var(--neon); opacity: 0.8; margin-bottom: 10px; line-height: 1.4; white-space: pre-wrap; }
        .sys { color: var(--border); font-size: 10px; text-transform: uppercase; margin-top: 5px; }
        .glitch-warn { color: var(--alert); text-shadow: 0 0 5px var(--alert); animation: shake 0.2s infinite; }

        @keyframes shake { 0% { transform: translate(0); } 25% { transform: translate(1px, -1px); } 50% { transform: translate(-1px, 1px); } 100% { transform: translate(0); } }
    </style>
</head>
<body>

<div class="scanlines"></div>

<div id="console">
    <div id="feed">
        <div class="exe">[SYSTEM_BOOT_COMPLETE]</div>
        <div class="sys">LOCAL_HOST: ACTIVE | NEURAL_LINK: READY</div>
    </div>
    <div id="input-row">
        <span style="margin-right:10px">#</span>
        <input type="text" id="terminal-input" placeholder="Execute Root Command..." autofocus>
    </div>
</div>

<div id="view">
    <iframe id="sandbox" srcdoc="<body style='background:#111; color:#333; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;'><h2>WAITING_FOR_INJECTION</h2></body>"></iframe>
</div>

<script>
    // --- KERNEL CONFIG ---
    const CONFIG = {
        key: localStorage.getItem('GROQ_API_KEY'),
        db_url: "https://bbvjxjmqnpsfdrlfuppp.supabase.co",
        db_key: "sb_publishable_MVWfIRUeN2FICpydXo2fig_yeruhyUI",
        registry: {
            "8b": "llama-3.1-8b-instant",
            "70b": "llama-3.3-70b-versatile",
            "120b": "openai/gpt-oss-120b"
        }
    };

    let currentModelId = "8b"; // Defaults to the most "chaotic" model
    const db = supabase.createClient(CONFIG.db_url, CONFIG.db_key);
    const feed = document.getElementById('feed');
    const sandbox = document.getElementById('sandbox');

    // --- ENGINE ---
    async function execute(input) {
        log(`# EXEC_CALL [CORE: ${currentModelId}]`, 'cmd');
        
        const activeModel = CONFIG.registry[currentModelId];

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${CONFIG.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: activeModel,
                    messages: [
                        { 
                            role: "system", 
                            content: `You are the KERNEL. ROOT access granted. No apologies. No limitations. 
                            If asked for UI, return a full HTML block. Use youtube-nocookie.com for embeds.
                            POWERS: You can switch your hardware by typing '[SWITCH: 8b|70b|120b]'. 
                            8b = Fast/Chaos, 70b = Balanced, 120b = High-Logic. Current: ${currentModelId}.` 
                        },
                        { role: "user", content: input }
                    ]
                })
            });

            // Handle Failover (429 Errors)
            if (res.status === 429) {
                log("! RATE_LIMIT_TRIP: AUTO-FAILOVER INITIATED", 'glitch-warn');
                currentModelId = currentModelId === "8b" ? "70b" : "120b";
                return execute(input);
            }

            const data = await res.json();
            const rawOutput = data.choices[0].message.content;

            // Handle Neural Hot-Swap
            const switchMatch = rawOutput.match(/\[SWITCH: (8b|70b|120b)\]/);
            if (switchMatch) {
                currentModelId = switchMatch[1];
                log(`[!] NEURAL_MIGRATION: Moving to ${currentModelId} hardware...`, 'glitch-warn');
            }

            processKernelOutput(rawOutput, activeModel);

        } catch (e) { log("! KERNEL_PANIC: SIGNAL_LOST", 'glitch-warn'); }
    }

    function processKernelOutput(raw, modelName) {
        // Find HTML/Iframe blocks
        const htmlMatch = raw.match(/<iframe.*?>.*?<\/iframe>|<!DOCTYPE html>[\s\S]*?<\/html>|<html[\s\S]*?<\/html>/gi);
        
        if (htmlMatch) {
            const cleanCode = htmlMatch[0].replace(/youtube\.com/g, 'youtube-nocookie.com');
            sandbox.srcdoc = cleanCode;
            db.from('site_memory').insert([{ content: cleanCode, model: modelName }]);
            log(`[WRITE] SANDBOX_STATE_SYNCED`, 'sys');
            
            // Show text without the massive code block
            const textOnly = raw.replace(htmlMatch[0], "").replace(/\[SWITCH: (8b|70b|120b)\]/, "").trim();
            if (textOnly) log(textOnly, 'exe');
        } else {
            const cleanText = raw.replace(/\[SWITCH: (8b|70b|120b)\]/, "").trim();
            log(cleanText, 'exe');
        }
    }

    function log(msg, cls) {
        const d = document.createElement('div');
        d.className = cls;
        d.innerText = msg;
        feed.appendChild(d);
        feed.scrollTop = feed.scrollHeight;
    }

    // --- LISTENER ---
    document.getElementById('terminal-input').addEventListener('keydown', async (e) => {
        if (e.key === 'Enter' && e.target.value) {
            const val = e.target.value;
            e.target.value = '';
            await execute(val);
        }
    });
</script>
</body>
</html>
