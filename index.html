<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERNEL_V33_SINGULARITY</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #console { width: 90%; max-width: 800px; height: 50vh; border: 1px solid #00ff41; padding: 15px; overflow-y: auto; background: #000; margin-bottom: 15px; border-radius: 4px; }
        .input-area { display: flex; width: 90%; max-width: 800px; gap: 10px; flex-wrap: wrap; }
        input { flex-grow: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; outline: none; min-width: 200px; }
        .btns { display: flex; gap: 5px; width: 100%; }
        button { flex: 1; background: #00ff41; color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #004411; }
        .sys { color: #888; }
        .err { color: #ff4444; }
    </style>
</head>
<body>

    <div id="console">
        <div class="sys">[SYSTEM]: OS_BOOT_COMPLETE...</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Awaiting Input..." autocomplete="off">
        <div class="btns">
            <button id="sendBtn" disabled>SEND</button>
            <button id="syncBtn">SYNC</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        const SUPABASE_URL = 'https://bbvjxjmqnpsfdrlfuppp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_MVWfIRUeN2FICpydXo2fig_yeruhyUI';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Using the Raw URL but adding a bypass for CORS via proxy
        const RAW_URL = "https://raw.githubusercontent.com/exploiter-Real/Starting/main/knowledge.txt";
        const PROXY_URL = "https://api.allorigins.win/raw?url=" + encodeURIComponent(RAW_URL);

        let extractor;
        const consoleEl = document.getElementById('console');
        const inputEl = document.getElementById('userInput');
        const btnEl = document.getElementById('sendBtn');
        const syncBtn = document.getElementById('syncBtn');

        function log(msg, isErr = false) {
            const div = document.createElement('div');
            if (isErr) div.className = 'err';
            div.textContent = `> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        async function init() {
            try {
                extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
                log("NEURAL_ENGINE_ONLINE");
                btnEl.disabled = false;
            } catch (err) {
                log("INIT_ERROR: " + err.message, true);
            }
        }

        syncBtn.addEventListener('click', async () => {
            syncBtn.disabled = true;
            log("ATTEMPTING_SYNC...");

            try {
                // Fetching via proxy to bypass GitHub's CORS protection on mobile
                const res = await fetch(PROXY_URL);
                if (!res.ok) throw new Error("NETWORK_RESPONSE_NOT_OK");
                
                const text = await res.text();
                if (text.includes("<!DOCTYPE html>")) throw new Error("INVALID_DATA_FORMAT");

                const sections = text.split(/\n\n|---/).filter(s => s.trim().length > 5);
                log(`PARSING_${sections.length}_LOGIC_NODES`);

                for (let i = 0; i < sections.length; i++) {
                    const section = sections[i].trim();
                    const output = await extractor(section, { pooling: 'mean', normalize: true });
                    
                    const { error } = await supabase.from('neural_knowledge').insert({
                        content: section,
                        embedding: Array.from(output.data)
                    });
                    
                    if (error) console.error(error);
                    if (i % 5 === 0) log(`SYNC_PROGRESS: ${Math.round((i/sections.length)*100)}%`);
                }
                log("SYNC_SUCCESSFUL");
            } catch (err) {
                log("SYNC_FATAL: " + err.message, true);
            } finally {
                syncBtn.disabled = false;
            }
        });

        async function handleInquiry() {
            const val = inputEl.value.trim();
            if (!val || !extractor) return;
            log(`USER: ${val}`);
            inputEl.value = '';

            try {
                const output = await extractor(val, { pooling: 'mean', normalize: true });
                const embedding = Array.from(output.data);

                const { data, error } = await supabase.rpc('match_knowledge', {
                    query_embedding: embedding,
                    match_threshold: 0.2,
                    match_count: 1
                });

                if (error) throw error;
                if (data && data.length > 0) {
                    log(`AI: ${data[0].content}`);
                } else {
                    log("AI: NO_MATCH_IN_MEMORY");
                }
            } catch (err) {
                log("QUERY_ERROR: " + err.message, true);
            }
        }

        btnEl.addEventListener('click', handleInquiry);
        inputEl.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleInquiry(); });
        init();
    </script>
</body>
</html>
