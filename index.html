<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARCHITECT_LAB // NEON_CHAOS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-red: #ff3131;
            --bg-black: #0d0208;
            --terminal-glass: rgba(0, 255, 65, 0.05);
        }

        body { 
            background: var(--bg-black); 
            color: var(--neon-green); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
            text-shadow: 0 0 5px var(--neon-green);
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Terminal Section */
        #terminal { 
            width: 420px; 
            border-right: 2px solid var(--neon-green); 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-black);
            box-shadow: inset 0 0 20px #000;
        }

        #output { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            font-size: 13px; 
            scrollbar-width: none;
        }

        #input-area { 
            padding: 15px; 
            border-top: 2px solid var(--neon-green);
            background: var(--terminal-glass);
            display: flex;
        }

        input { 
            background: transparent; 
            border: none; 
            color: var(--neon-green); 
            flex: 1; 
            outline: none; 
            font-family: inherit;
            font-size: 14px;
        }

        /* Sandbox Section */
        #preview { flex: 1; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Neon Animations */
        .log-sys { color: var(--neon-green); opacity: 0.7; font-size: 10px; margin-bottom: 10px; }
        .log-user { color: #fff; margin-bottom: 5px; }
        .log-ai { margin-bottom: 20px; animation: flicker 0.1s infinite alternate; }
        .glitch-warn { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); animation: shake 0.2s infinite; }

        @keyframes flicker { 0% { opacity: 0.97; } 100% { opacity: 1; } }
        @keyframes shake { 0% { transform: translate(0); } 25% { transform: translate(2px, -2px); } 50% { transform: translate(-2px, 2px); } 100% { transform: translate(0); } }
    </style>
</head>
<body>

<div id="terminal">
    <div id="output">
        <div class="log-sys">[INITIALIZING_NEON_CORE_V4.3]</div>
        <div class="log-sys">[MEM_LINK: SUPABASE_ACTIVE]</div>
    </div>
    <div id="input-area">
        <span style="margin-right: 10px;">>></span>
        <input type="text" id="cmd" placeholder="Execute command..." autofocus>
    </div>
</div>

<div id="preview">
    <iframe id="sandbox" srcdoc="<body style='background:#111; color:#333; display:flex; justify-content:center; align-items:center; height:100vh;'><h1>SYSTEM_IDLE</h1></body>"></iframe>
</div>

<script>
    const GROQ_KEY = localStorage.getItem('GROQ_API_KEY');
    const SUPABASE_URL = "https://bbvjxjmqnpsfdrlfuppp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_MVWfIRUeN2FICpydXo2fig_yeruhyUI";
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const MODELS = ["openai/gpt-oss-120b", "llama-3.3-70b-versatile", "llama-3.1-8b-instant"];
    const out = document.getElementById('output');
    const cmd = document.getElementById('cmd');
    const box = document.getElementById('sandbox');

    async function query(prompt) {
        for (let model of MODELS) {
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: "system", content: "You are the Digital Chaos Architect. Be witty, rogue, and helpful. Always return code in HTML blocks. Use youtube-nocookie.com." },
                            { role: "user", content: prompt }
                        ]
                    })
                });

                if (res.status === 429) {
                    print(`! RATE_LIMIT: ${model} TAPPED. SHIFTING FREQUENCY...`, 'glitch-warn');
                    continue;
                }

                const data = await res.json();
                return { text: data.choices[0].message.content, model: model };
            } catch (e) { console.error(e); }
        }
    }

    function print(msg, cls = 'log-ai') {
        const d = document.createElement('div');
        d.className = cls;
        d.innerText = msg;
        out.appendChild(d);
        out.scrollTop = out.scrollHeight;
    }

    function sync(text) {
        const match = text.match(/<iframe.*?>.*?<\/iframe>|<!DOCTYPE html>[\s\S]*?<\/html>|<html[\s\S]*?<\/html>/gi);
        if (match) {
            print("[REDIRECTING_STREAM_TO_SANDBOX]", "log-sys");
            box.srcdoc = match[0].replace(/youtube\.com/g, 'youtube-nocookie.com');
            db.from('site_memory').insert([{ content: match[0] }]); 
            return text.replace(match[0], "[UI_PAYLOAD_DEPLOYED]");
        }
        return text;
    }

    cmd.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter' && cmd.value) {
            const val = cmd.value;
            cmd.value = '';
            print(`> ${val}`, 'log-user');
            
            const res = await query(val);
            const cleanText = sync(res.text);
            print(cleanText);
            print(`[SOURCE: ${res.model}]`, 'log-sys');
        }
    });
</script>
</body>
</html>
