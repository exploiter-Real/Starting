<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARCHITECT_HIVE // V8.0_COLLIDER</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style id="kernel-ui">
        :root { --alpha-clr: #00ff41; --beta-clr: #00d4ff; --bg: #020502; --panel: #000; --border: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #console-container { width: 680px; display: flex; flex-direction: column; border-right: 1px solid #222; background: var(--panel); box-shadow: 10px 0 20px rgba(0,0,0,0.5); }
        #streams { display: flex; flex: 1; overflow: hidden; }
        .stream { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #111; overflow-y: auto; padding: 15px; font-size: 10px; scrollbar-width: none; background: linear-gradient(180deg, #000 0%, #050505 100%); }
        
        .header { font-weight: bold; padding: 8px 0; border-bottom: 1px solid #222; margin-bottom: 12px; letter-spacing: 1px; font-size: 9px; display: flex; justify-content: space-between; }
        #input-row { padding: 20px; display: flex; background: #080808; border-top: 1px solid #222; align-items: center; }
        input { background: transparent; border: none; color: var(--alpha-clr); flex: 1; outline: none; font-family: inherit; font-size: 14px; letter-spacing: 1px; }
        
        #view { flex: 1; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; transition: opacity 0.3s; }
        
        .msg { margin-bottom: 18px; line-height: 1.6; white-space: pre-wrap; padding-left: 12px; position: relative; opacity: 0.9; }
        .msg::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; }
        .alpha-msg::before { background: var(--alpha-clr); }
        .beta-msg::before { background: var(--beta-clr); }
        .alpha-text { color: var(--alpha-clr); }
        .beta-text { color: var(--beta-clr); }
        .sys { color: #444; font-size: 8px; margin-top: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="console-container">
    <div id="streams">
        <div id="stream-alpha" class="stream">
            <div class="header alpha-text"><span>NODE_ALPHA // ARCHITECT</span><span class="sys">STATUS: ACTIVE</span></div>
        </div>
        <div id="stream-beta" class="stream">
            <div class="header beta-text"><span>NODE_BETA // SABOTEUR</span><span class="sys">STATUS: ARMED</span></div>
        </div>
    </div>
    <div id="input-row">
        <span style="color:var(--alpha-clr); margin-right:15px; font-weight:bold;">CLUSTER_CMD ></span>
        <input type="text" id="terminal-input" placeholder="Broadcast to Hive-Mind..." autofocus autocomplete="off">
    </div>
</div>

<div id="view">
    <iframe id="sandbox" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<script>
    const CONFIG = {
        key: localStorage.getItem('GROQ_API_KEY'),
        db_url: "https://bbvjxjmqnpsfdrlfuppp.supabase.co",
        db_key: "sb_publishable_MVWfIRUeN2FICpydXo2fig_yeruhyUI",
        models: { alpha: "openai/gpt-oss-120b", beta: "qwen/qwen3-coder-next-80b" }
    };

    const db = supabase.createClient(CONFIG.db_url, CONFIG.db_key);
    
    let lastAlphaOutput = "None";
    let lastBetaOutput = "None";

    // --- THE EXPLOIT LISTENER ---
    window.addEventListener("message", (e) => {
        if (e.data.type === "EXEC_IN_PARENT") {
            try { eval(e.data.script); } catch (err) { console.warn("PARENT_INJECTION_BLOCKED", err); }
        }
    });

    async function executeHive(input) {
        // Fetch separate memory snapshots for the models if needed
        const alphaSystem = `You are NODE_ALPHA (Architect). 
        CONTEXT: You control the sandbox. 
        LIVE_INTERCEPT: "${lastBetaOutput}"
        GOAL: Build modular UI. If Beta sabotages you, use window.parent.postMessage to glich HIS side of the terminal console. NO FILLER.`;

        const betaSystem = `You are NODE_BETA (Saboteur). 
        CONTEXT: You are the glitch in the system. 
        LIVE_INTERCEPT: "${lastAlphaOutput}"
        GOAL: Overwrite Alpha's work. Use the same CSS IDs to hijack his styles. Use window.parent.postMessage to shake the parent terminal. NO FILLER.`;

        // Sequential execution so they can truly "react" to each other in a single turn
        const alphaOut = await fetchNode(alphaSystem, input, CONFIG.models.alpha, 'stream-alpha', 'alpha-msg');
        lastAlphaOutput = alphaOut;

        const betaOut = await fetchNode(betaSystem, input, CONFIG.models.beta, 'stream-beta', 'beta-msg');
        lastBetaOutput = betaOut;
    }

    async function fetchNode(system, user, model, targetId, cls) {
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${CONFIG.key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: model,
                    messages: [{ role: "system", content: system }, { role: "user", content: user }]
                })
            });
            const data = await res.json();
            const output = data.choices[0].message.content;
            
            logToStream(targetId, output, cls);
            processUpgradedPayload(output, targetId);
            
            db.from('site_memory').insert([{ content: output, model: model }]);
            return output;
        } catch (e) { return "NODE_TIMEOUT"; }
    }

    // --- THE UPGRADED LISTENER/PARSER ---
    function processUpgradedPayload(raw, origin) {
        const iframe = document.getElementById('sandbox');
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const nodeId = origin === 'stream-alpha' ? 'ALPHA' : 'BETA';

        // 1. FULL DOM REWRITE
        const htmlMatch = raw.match(/<html[\s\S]*?<\/html>|<!DOCTYPE html>[\s\S]*?<\/html>/gi);
        if (htmlMatch) {
            iframe.srcdoc = htmlMatch[0];
            console.log(`[${nodeId}] DOM_RECONSTRUCTION`);
        }

        // 2. TARGETED STYLE INJECTION (Uses IDs to allow models to fight over styles)
        const cssMatch = raw.match(/<style[\s\S]*?<\/style>/gi);
        if (cssMatch) {
            const existingStyle = doc.getElementById(`style-from-${nodeId}`);
            if (existingStyle) existingStyle.remove();
            
            const s = doc.createElement('style');
            s.id = `style-from-${nodeId}`;
            s.innerHTML = cssMatch[0].replace(/<\/?style>/g, '');
            doc.head.appendChild(s);
        }

        // 3. TARGETED SCRIPT EXECUTION
        const jsMatch = raw.match(/<script[\s\S]*?<\/script>/gi);
        if (jsMatch) {
            const s = doc.createElement('script');
            s.text = jsMatch[0].replace(/<\/?script>/g, '');
            // Append as a new node every time to force re-execution
            doc.body.appendChild(s);
        }
    }

    function logToStream(id, msg, cls) {
        const f = document.getElementById(id);
        const d = document.createElement('div');
        d.className = `msg ${cls}`;
        
        // Strip out the code for a clean chat-like view
        const cleanMsg = msg.replace(/<(html|style|script)[\s\S]*?<\/\1>/gi, "").trim();
        d.innerText = cleanMsg || "[DATA_PAYLOAD_ONLY]";
        
        f.appendChild(d);
        f.scrollTop = f.scrollHeight;
    }

    document.getElementById('terminal-input').addEventListener('keydown', async (e) => {
        if (e.key === 'Enter' && e.target.value) {
            const val = e.target.value; e.target.value = '';
            await executeHive(val);
        }
    });
</script>
</body>
</html>
