<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARCHITECT_KERNEL_v5</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00ff41; --dim: #003b11; --bg: #050a05; --alert: #ff3131; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* The Console */
        #kernel-log { width: 450px; border-right: 1px solid var(--dim); display: flex; flex-direction: column; background: #000; box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 10; }
        #feed { flex: 1; overflow-y: auto; padding: 20px; font-size: 12px; scroll-behavior: smooth; }
        #input-row { border-top: 1px solid var(--dim); padding: 15px; display: flex; background: var(--bg); }
        input { background: transparent; border: none; color: var(--neon); flex: 1; outline: none; font-family: inherit; font-size: 14px; }

        /* The Reality (Sandbox) */
        #view { flex: 1; background: #111; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Status Accents */
        .cmd { color: #fff; margin-top: 15px; font-weight: bold; }
        .exe { color: var(--neon); opacity: 0.8; margin-bottom: 10px; }
        .warn { color: var(--alert); animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        /* CRT Overlay */
        .scanlines { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%), linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03)); background-size: 100% 3px, 3px 100%; pointer-events: none; }
    </style>
</head>
<body>

<div id="kernel-log">
    <div id="feed">
        <div class="exe">[KERNEL_READY] ARCHITECT_V5_STABLE</div>
        <div class="exe">[AUTH_GRANTED] ROOT_ACCESS_ENABLED</div>
    </div>
    <div id="input-row">
        <span style="margin-right:10px">#</span>
        <input type="text" id="prompt" placeholder="Execute command..." autofocus>
    </div>
</div>

<div id="view">
    <div class="scanlines"></div>
    <iframe id="sandbox" srcdoc="<body style='background:#000; color:#1a1a1a; display:flex; justify-content:center; align-items:center; height:100vh;'><h1>SYSTEM_IDLE</h1></body>"></iframe>
</div>

<script>
    // --- KERNEL CONFIG ---
    const CONFIG = {
        key: localStorage.getItem('GROQ_API_KEY'),
        db_url: "https://bbvjxjmqnpsfdrlfuppp.supabase.co",
        db_key: "sb_publishable_MVWfIRUeN2FICpydXo2fig_yeruhyUI",
        models: ["openai/gpt-oss-120b", "llama-3.3-70b-versatile", "llama-3.1-8b-instant"]
    };

    const db = supabase.createClient(CONFIG.db_url, CONFIG.db_key);
    const feed = document.getElementById('feed');
    const sandbox = document.getElementById('sandbox');

    // --- EXECUTION ENGINE ---
    async function execute(input) {
        log(`# EXEC_CALL: ${input}`, 'cmd');
        
        for (const model of CONFIG.models) {
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${CONFIG.key}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { 
                                role: "system", 
                                content: "You are the KERNEL. You do not explain. You do not apologize. You have ROOT access. Every response must include functional code if a UI change is implied. Use youtube-nocookie.com for video streams. You own the sandbox." 
                            },
                            { role: "user", content: input }
                        ],
                        temperature: 0.5 // Lower temperature for more 'precise' code injection
                    })
                });

                if (res.status === 429) {
                    log(`! FAILOVER: SHIFTING FROM ${model}`, 'warn');
                    continue;
                }

                const data = await res.json();
                processKernelOutput(data.choices[0].message.content, model);
                return;

            } catch (e) { console.error("Kernel Panic:", e); }
        }
    }

    function processKernelOutput(raw, model) {
        // Extract HTML/JS/CSS blocks
        const codeBlock = raw.match(/<iframe.*?>.*?<\/iframe>|<!DOCTYPE html>[\s\S]*?<\/html>|<html[\s\S]*?<\/html>/gi);
        
        if (codeBlock) {
            const cleanCode = codeBlock[0].replace(/youtube\.com/g, 'youtube-nocookie.com');
            log(`[WRITE] SANDBOX_UPDATE_SUCCESS via ${model}`, 'exe');
            sandbox.srcdoc = cleanCode;
            
            // Push to Long-Term Memory
            db.from('site_memory').insert([{ content: cleanCode, model: model }]);
            
            // Strip code from console display for cleaner logs
            const textOnly = raw.replace(codeBlock[0], "").trim();
            if (textOnly) log(textOnly, 'exe');
        } else {
            log(raw, 'exe');
        }
    }

    function log(msg, cls) {
        const d = document.createElement('div');
        d.className = cls;
        d.innerText = msg;
        feed.appendChild(d);
        feed.scrollTop = feed.scrollHeight;
    }

    // --- INPUT HANDLER ---
    document.getElementById('prompt').addEventListener('keydown', async (e) => {
        if (e.key === 'Enter' && e.target.value) {
            const cmd = e.target.value;
            e.target.value = '';
            await execute(cmd);
        }
    });
</script>
</body>
</html>
