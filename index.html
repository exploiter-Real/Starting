<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERNEL_V33_SINGULARITY | Neural Core</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #console { width: 80%; max-width: 800px; height: 400px; border: 1px solid #00ff41; padding: 20px; overflow-y: auto; background: rgba(0, 20, 0, 0.9); box-shadow: 0 0 15px #00ff41; margin-bottom: 20px; }
        .input-area { display: flex; width: 80%; max-width: 800px; gap: 10px; }
        input { flex-grow: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #004411; cursor: not-allowed; }
        .thought { color: #888; font-style: italic; font-size: 0.9em; }
        .system { color: #00ccff; }
    </style>
</head>
<body>

    <div id="console">
        <div class="system">[SYSTEM_READY]: INITIALIZING_NEURAL_INFRASTRUCTURE...</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="ENTER_LOGIC_STREAM..." autocomplete="off">
        <button id="sendBtn" disabled>ENGAGE</button>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        // CREDENTIALS_LOADED
        const SUPABASE_URL = 'https://bbvjxjmqnpsfdrlfuppp.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_MVWfIRUeN2FICpydXo2fig_yeruhyUI';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let extractor;
        const consoleEl = document.getElementById('console');
        const inputEl = document.getElementById('userInput');
        const btnEl = document.getElementById('sendBtn');

        function log(msg, type = '') {
            const div = document.createElement('div');
            if (type) div.classList.add(type);
            div.textContent = `> ${msg}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        async function init() {
            try {
                log("LOADING_TRANSFORMER_MODEL (all-MiniLM-L6-v2)...", "thought");
                // This downloads the model to the browser cache (only happens once)
                extractor = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
                log("NEURAL_CORE_ONLINE. CONNECTION_ESTABLISHED.", "system");
                btnEl.disabled = false;
            } catch (err) {
                log("CORE_INITIALIZATION_FAILURE: " + err.message);
            }
        }

        async function handleInquiry() {
            const query = inputEl.value.trim();
            if (!query || !extractor) return;

            log(`INPUT: ${query}`);
            inputEl.value = '';
            btnEl.disabled = true;

            try {
                log("GENERATING_VECTOR_EMBEDDING...", "thought");
                const output = await extractor(query, { pooling: 'mean', normalize: true });
                const embedding = Array.from(output.data);

                log("EXECUTING_VECTOR_SIMILARITY_SEARCH...", "thought");
                const { data, error } = await supabase.rpc('match_knowledge', {
                    query_embedding: embedding,
                    match_threshold: 0.3, 
                    match_count: 1
                });

                if (error) throw error;

                if (data && data.length > 0) {
                    log(`RESPONSE: ${data[0].content}`);
                    log(`[NEURAL_SIMILARITY: ${(data[0].similarity * 100).toFixed(2)}%]`, "thought");
                } else {
                    log("SYSTEM_IDLE: NO_CONCEPTUAL_MATCH_IN_LOGIC_STREAM.");
                }
            } catch (err) {
                log("NEURAL_PROCESS_ERROR: " + err.message);
            } finally {
                btnEl.disabled = false;
            }
        }

        // SYNC_TOOL: Call this from the browser console to populate your database
        window.syncNeuralData = async (url) => {
            log("INITIATING_SYNCHRONIZATION_SEQUENCE...", "system");
            const res = await fetch(url);
            const text = await res.text();
            const lines = text.split('\n').filter(l => l.trim().length > 3);
            
            log(`PARSING_${lines.length}_LOGIC_NODES.`);
            
            for (let line of lines) {
                const output = await extractor(line, { pooling: 'mean', normalize: true });
                const { error } = await supabase.from('neural_knowledge').insert({
                    content: line.trim(),
                    embedding: Array.from(output.data)
                });
                if (error) console.error("SYNC_ERROR:", error);
                else console.log("VECTOR_STORED:", line);
            }
            log("SYNCHRONIZATION_COMPLETE. BRAIN_READY.", "system");
        };

        btnEl.addEventListener('click', handleInquiry);
        inputEl.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleInquiry(); });

        init();
    </script>
</body>
</html>
