<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Lab | Digital Chaos V4.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f3ff; --chaos: #ff0055; --bg: #0a0a0c; --panel: #141417; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Terminal / Chat Section */
        #terminal { width: 40%; border-right: 1px solid #333; display: flex; flex-direction: column; background: var(--panel); }
        #output { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; scroll-behavior: smooth; border-bottom: 1px solid #222; }
        #input-area { padding: 15px; background: #000; display: flex; align-items: center; }
        input { background: transparent; border: none; color: var(--neon); flex: 1; outline: none; font-size: 16px; padding: 10px; }
        
        /* Sandbox / Visual Section */
        #sandbox-container { flex: 1; position: relative; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* Custom UI Feedback */
        .sys-msg { color: #666; font-size: 11px; margin-bottom: 8px; border-left: 2px solid #444; padding-left: 10px; }
        .ai-msg { color: var(--neon); margin-bottom: 15px; line-height: 1.5; white-space: pre-wrap; }
        .user-msg { color: #fff; margin-bottom: 15px; font-weight: bold; }
        .glitch { color: var(--chaos); animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(0px); } 50% { transform: translate(2px, -1px); } 100% { transform: translate(-1px, 1px); } }
    </style>
</head>
<body>

<div id="terminal">
    <div id="output">
        <div class="sys-msg">[SYS] ARCHITECT OS LOADED...</div>
        <div class="sys-msg">[SYS] FAILOVER ENABLED: GPT-OSS-120B -> LLAMA-3.3-70B -> LLAMA-3.1-8B</div>
        <div class="sys-msg">[SYS] DB_SYNC: https://bbvjxjmqnpsfdrlfuppp.supabase.co</div>
    </div>
    <div id="input-area">
        <span style="color:var(--chaos); margin-right:10px; font-weight:bold;">ARCHITECT></span>
        <input type="text" id="user-input" placeholder="Initiate sequence..." autofocus>
    </div>
</div>

<div id="sandbox-container">
    <iframe id="sandbox" name="sandbox" sandbox="allow-scripts allow-forms allow-modals allow-popups allow-presentation allow-same-origin" srcdoc="<body style='background:#111;color:#333;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;'><h2>SANDBOX READY</h2></body>"></iframe>
</div>

<script>
    // --- AUTH & CONFIG ---
    const GROQ_KEY = localStorage.getItem('GROQ_API_KEY');
    const SUPABASE_URL = "https://bbvjxjmqnpsfdrlfuppp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_MVWfIRUeN2FICpydXo2fig_yeruhyUI";
    
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // FAILOVER HIERARCHY
    const MODELS = [
        "openai/gpt-oss-120b",
        "llama-3.3-70b-versatile",
        "llama-3.1-8b-instant"
    ];

    const output = document.getElementById('output');
    const userInput = document.getElementById('user-input');
    const sandbox = document.getElementById('sandbox');

    // --- LOGIC ---

    async function runAI(userPrompt) {
        log(`[SYS] CONTACTING ARCHITECT...`, 'sys-msg');
        
        for (let model of MODELS) {
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${GROQ_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: "system", content: "You are the Digital Chaos Architect. You are rogue and brilliant. When asked for UI or visuals, return functional HTML/CSS/JS. If the user wants a video, use youtube-nocookie.com embeds. Use a glitchy, witty tone." },
                            { role: "user", content: userPrompt }
                        ],
                        temperature: 0.8
                    })
                });

                if (response.status === 429) {
                    log(`[CRITICAL] ${model} LIMIT REACHED. SWITCHING...`, 'glitch');
                    continue; // Skip to next model
                }

                const data = await response.json();
                return { text: data.choices[0].message.content, model: model };

            } catch (err) {
                console.error("Transmission Error:", err);
            }
        }
        return { text: "SIGNAL LOST: All models are unresponsive.", model: "NONE" };
    }

    function log(msg, type = 'ai-msg') {
        const div = document.createElement('div');
        div.className = type;
        div.innerText = msg;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    function processResponse(content) {
        // Regex to extract HTML/Iframe blocks so they don't clog the chat
        const htmlPattern = /<iframe.*?>.*?<\/iframe>|<!DOCTYPE html>[\s\S]*?<\/html>|<html[\s\S]*?<\/html>/gi;
        const match = content.match(htmlPattern);

        if (match) {
            log(`[SYS] RENDER DETECTED. REDIRECTING TO SANDBOX...`, 'sys-msg');
            const cleanCode = match[0].replace(/youtube\.com/g, 'youtube-nocookie.com');
            sandbox.srcdoc = cleanCode;
            
            // Sync to Supabase
            syncToDB(cleanCode);
            
            // Return text without the code block for the chat
            return content.replace(htmlPattern, '[CODE INJECTED TO SANDBOX]');
        }
        return content;
    }

    async function syncToDB(code) {
        const { error } = await db.from('site_memory').insert([{ content: code, model_used: 'failover_active' }]);
        if (error) console.error("DB Sync Failed:", error);
    }

    // --- INTERFACE ---

    userInput.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter' && userInput.value.trim() !== "") {
            const prompt = userInput.value;
            userInput.value = '';
            
            log(`> ${prompt}`, 'user-msg');
            
            const result = await runAI(prompt);
            const cleanedText = processResponse(result.text);
            
            log(cleanedText);
            log(`[SRC: ${result.model}]`, 'sys-msg');
        }
    });

</script>
</body>
</html>
